    <noscript>
      <div style="max-width:760px;margin:0 auto;padding:48px 24px;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#edf7ff;background:#030712;line-height:1.55;">
        <p style="font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#67e8f9;margin:0 0 8px;">SolanaGuard · Devnet MVP</p>
        <h2 style="font-size:28px;line-height:1.15;margin:0 0 16px;color:#edf7ff;">Policy firewall for AI-agent Solana wallets</h2>
        <p style="color:#9fb0c7;margin:0 0 20px;">
          SolanaGuard sits between an autonomous agent and the Solana chain. Every transaction an
          AI agent proposes is checked against an owner-defined policy before it runs, scored for
          risk, written to an append-only audit log, and killable with a one-click emergency pause.
        </p>
        <h3 style="font-size:18px;margin:24px 0 8px;color:#edf7ff;">Who it's for</h3>
        <p style="color:#9fb0c7;margin:0 0 20px;">
          Builders running autonomous agents, trading bots, payment agents, and wallet-automation
          flows that hold or move funds on Solana.
        </p>
        <h3 style="font-size:18px;margin:24px 0 8px;color:#edf7ff;">Policies it enforces</h3>
        <ul style="color:#9fb0c7;margin:0 0 20px;padding-left:20px;">
          <li>Per-transaction spend limits and daily spending limits</li>
          <li>Program allowlists and blocklists</li>
          <li>Transaction risk scoring with manual-approval thresholds</li>
          <li>Append-only audit logs of every decision</li>
          <li>Emergency pause (kill switch) that blocks all agent actions instantly</li>
        </ul>
        <h3 style="font-size:18px;margin:24px 0 8px;color:#edf7ff;">Status</h3>
        <p style="color:#9fb0c7;margin:0 0 20px;">
          An off-chain policy engine powers the live demo, and an on-chain enforcement program is
          deployed on Solana devnet. This is an early devnet MVP: it is not audited, has no
          production users, and CPI-guarded fund movement is future work. No real funds are moved
          in the demo. The interactive demo requires JavaScript.
        </p>
